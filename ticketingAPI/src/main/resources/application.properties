spring.application.name=ticketingAPI

# MongoDB local (Docker). Les valeurs par defaut pointent sur docker-compose.yml.
# NB Spring Boot 4 : le prefixe est "spring.mongodb.*" (et non plus "spring.data.mongodb.*").
# Plus tard, Infisical pourra surcharger MONGODB_URI / MONGODB_DATABASE sans toucher au code.
spring.mongodb.uri=${MONGODB_URI:mongodb://root:root@localhost:27017/ticketing?authSource=admin}
spring.mongodb.database=${MONGODB_DATABASE:ticketing}

# Blockchain (Sepolia par defaut). Fournir RPC_URL et DEPLOYER_PRIVATE_KEY via env / Infisical.
# DEPLOYER_PRIVATE_KEY = cle privee d'un compte finance en ETH de test (devient owner de chaque contrat deploye).
blockchain.rpc-url=${RPC_URL:}
blockchain.chain-id=${CHAIN_ID:11155111}
blockchain.deployer-private-key=${DEPLOYER_PRIVATE_KEY:}
